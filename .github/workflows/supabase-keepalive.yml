name: Supabase keepalive

# Supabase free-tier projects PAUSE after ~7 days of inactivity, which would
# take the whole app offline until someone manually resumes them. This job
# pings a read-only health endpoint on the deployed app once a day. That
# endpoint runs a real Postgres query (see app/api/health/db/route.ts), so a
# single ping keeps both Supabase and the Vercel deployment warm.
#
# Runs on GitHub's own scheduler: free, independent of the Vercel plan's cron
# limits, and needs no secrets because the endpoint is public and read-only.
#
# Note: GitHub disables scheduled workflows after 60 days with no repo
# activity. This repo auto-deploys `main` and is actively developed, so that
# is not a concern in practice — but if the repo ever goes idle, re-enable it
# from the Actions tab.

on:
  schedule:
    # 09:00 UTC every day. Daily (not every-other-day) gives comfortable
    # margin against GitHub occasionally delaying or skipping a scheduled run.
    - cron: '0 9 * * *'
  # Lets you trigger a ping by hand from the Actions tab.
  workflow_dispatch: {}

# If a previous run is somehow still going, don't stack another on top.
concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase health endpoint
        run: |
          set -euo pipefail
          url="https://crm-sde-hemed.vercel.app/api/health/db"
          echo "Pinging $url"
          code=$(curl -sS --retry 3 --retry-delay 10 -m 30 -o response.json -w '%{http_code}' "$url" || echo "000")
          echo "HTTP $code"
          echo "Body:"
          cat response.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Supabase keepalive ping failed (HTTP $code)"
            exit 1
          fi
          echo "Keepalive ping OK"
